<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ashwin Vaidya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;1,300&family=Noto+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/apprentice.min.css"
    />
    <link rel="stylesheet" href="static/style.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"],
          ],
        },
        options: { processHtmlClass: "pane" },
      };
    </script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="tab-bar">
        <div class="tab-bar-actions">
          <button type="button" class="btn open-vault" title="Open note list">
            [≡]
          </button>
        </div>
        <div class="tab-bar-welcome">
          <div class="welcome-box-row" id="welcome-box-row">
            <span>Ashwin Vaidya</span>
            <span class="welcome-sep">·</span>
            <span><kbd>⌘K</kbd>/<kbd>Ctrl+K</kbd> search</span>
            <span class="welcome-sep" id="welcome-section-sep">·</span>
            <span id="welcome-section-links"></span>
          </div>
        </div>
        <div class="tabs" role="tablist"></div>
      </header>
      <aside class="sidebar" id="sidebar" aria-hidden="true">
        <div
          class="sidebar-sections"
          id="sidebar-sections"
          aria-label="Sections"
        ></div>
        <div class="sidebar-header">
          <h2>─ posts ─</h2>
          <button type="button" class="btn close-sidebar" aria-label="Close">
            ×
          </button>
        </div>
        <ul class="note-list" id="note-list"></ul>
      </aside>
      <div class="content-and-toc">
        <main class="content" id="content">
          <div class="welcome" id="welcome">
            <div id="welcome-sections"></div>
          </div>
          <div
            class="panes-row"
            id="pane-container"
            aria-label="Note panes"
          ></div>
        </main>
        <aside
          class="toc-sidebar hidden"
          id="toc-sidebar"
          aria-label="Table of contents"
        >
          <div class="toc-header">Contents</div>
          <nav class="toc-nav" id="toc-nav"></nav>
        </aside>
      </div>
      <footer class="status-bar">
        <div class="status-bar-inner">
          <span class="status-segment status-segment-left"
            >© Ashwin Vaidya</span
          >
          <div class="status-bar-right" id="status-path-wrap">
            <span
              class="status-chevron status-chevron-path"
              id="status-chevron-path"
              aria-hidden="true"
            ></span>
            <div
              class="status-path-segments"
              id="status-path"
              aria-live="polite"
              title=""
            ></div>
          </div>
        </div>
      </footer>
    </div>
    <div
      class="wiki-preview"
      id="wiki-preview"
      aria-hidden="true"
      role="tooltip"
    ></div>
    <div class="fuzzy-overlay" id="fuzzy-overlay" aria-hidden="true">
      <div class="fuzzy-dialog" role="dialog" aria-label="Search notes">
        <div class="fuzzy-input-wrap">
          <span class="fuzzy-prompt">&gt;</span>
          <input
            type="text"
            class="fuzzy-input"
            id="fuzzy-input"
            placeholder=" search notes…"
            autocomplete="off"
          />
        </div>
        <ul class="fuzzy-results" id="fuzzy-results" role="listbox"></ul>
        <div class="fuzzy-hint">↑↓ navigate enter open esc close</div>
      </div>
    </div>
    <script src="static/app.js"></script>
    <script>
      window.wikiTypeset = function (el) {
        if (window.MathJax && window.MathJax.typesetPromise)
          window.MathJax.typesetPromise([el]).catch(function () {});
        if (window.hljs && el)
          el.querySelectorAll("pre code").forEach(function (c) {
            hljs.highlightElement(c);
          });
      };
    </script>
  </body>
</html>
